name: Deploy with cache busting

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Generate version string (date + short commit hash)
        id: version
        run: |
          echo "VERSION=$(date +'%Y-%m-%d')-$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Stamp version into sw.js
        run: |
          sed -i "s/%%VERSION%%/${{ steps.version.outputs.VERSION }}/g" sw.js

      - name: Stamp version into index.html
        run: |
          sed -i "s/%%VERSION%%/${{ steps.version.outputs.VERSION }}/g" index.html

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./
          publish_branch: gh-pages
          exclude_assets: '.github,*.md,*.yml'
